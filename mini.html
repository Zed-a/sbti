<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>兽音加密 - 有趣又安全的暗语生成器</title>
  <style>
    :root {
      --bg: #f8fbf8;
      --card: #ffffff;
      --text: #2c3e32;
      --muted: #728276;
      --accent: #07c160;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 0 24px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px 24px;
      box-shadow: 0 16px 32px rgba(7, 193, 96, 0.08);
      border: 1px solid rgba(7, 193, 96, 0.15);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px 0;
      color: var(--text);
    }
    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 32px 0;
    }
    .qr-box {
      background: #fdfdfd;
      padding: 24px;
      border-radius: 24px;
      border: 1px dashed #d6e8dd;
      display: inline-block;
      margin-bottom: 24px;
    }
    .qr-box img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      display: block;
      /* 允许长按保存/扫描 */
      -webkit-touch-callout: default;
      pointer-events: auto;
    }
    .action-tip {
      font-size: 14px;
      font-weight: bold;
      color: var(--accent);
      background: #ebfcf0;
      padding: 10px 20px;
      border-radius: 99px;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(7, 193, 96, 0.3); }
      70% { box-shadow: 0 0 0 10px rgba(7, 193, 96, 0); }
      100% { box-shadow: 0 0 0 0 rgba(7, 193, 96, 0); }
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>网盘链接怕被封？</h1>
      <p>快来试试**兽音加密**小工具<br>把链接变成有趣的【兽语暗号】</p>

      <div class="qr-box">
        <img src="mini_qr.png" alt="长按扫码使用兽音加密">
      </div>

      <div>
        <div class="action-tip">👇 微信内长按上方喵喵，或截图扫码</div>
      </div>
    </div>

    <!-- 绝对安全的返回测试页链接，不依赖浏览器历史记录 -->
    <a href="index.html" class="back-link">🔙 返回测试页</a>
  </div>

</body>
</html>
